name: Build Custom Windows Client

on:
  workflow_dispatch: # This adds the "Run workflow" manual button to GitHub UI

jobs:
  build:
    name: Build Custom Client Exe
    runs-on: windows-2022

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Flutter Toolchain
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup Rust Compiler
        uses: dtolnay/rust-toolchain@stable

      - name: Build RustDesk Windows Client
        env:
          RENDEZVOUS_SERVER: ${{ vars.RENDEZVOUS_SERVER }}
          API_SERVER: ${{ vars.API_SERVER }}
          RS_PUB_KEY: ${{ vars.RS_PUB_KEY }}
        run: |
          python build.py --flutter

      - name: Upload Finished Executable
        uses: actions/upload-artifact@v4
        with:
          name: BetterDesk-Windows-Client
          path: target/release/rustdesk.exe
