name: Build Custom Windows Client

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Custom Client Exe
    runs-on: windows-2022

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          submodules: recursive # CRITICAL: RustDesk will crash without its C++ submodules cloned

      - name: Install LLVM, vcpkg & System Tools
        run: |
          choco install llvm wget unzip vcpkg -y
          echo "C:\Program Files\LLVM\bin" >> $GITHUB_PATH
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $GITHUB_ENV
        shell: powershell

      - name: Setup Flutter Toolchain
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Setup Rust Compiler
        uses: dtolnay/rust-toolchain@stable # CHANGED: Uses stable release runner instead of master
        with:
          toolchain: 1.78.0 # CHANGED: Updated to a completely stable modern release 
          targets: x86_64-pc-windows-msvc

      - name: Bootstrap Rust Bridge Codegen
        run: |
          cargo install flutter_rust_bridge_codegen --version 1.80.1 --features uuid
          cd flutter
          flutter pub get
        shell: powershell

      - name: Build RustDesk Windows Client
        env:
          RENDEZVOUS_SERVER: ${{ vars.RENDEZVOUS_SERVER }}
          API_SERVER: ${{ vars.API_SERVER }}
          RS_PUB_KEY: ${{ vars.RS_PUB_KEY }}
        run: |
          python build.py --flutter

      - name: Upload Finished Executable
        uses: actions/upload-artifact@v4
        with:
          name: BetterDesk-Windows-Client
          path: flutter/build/windows/x64/runner/Release/
